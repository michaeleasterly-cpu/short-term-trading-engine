name: secret-scan

# Public-repo secret-scanner gate.  Repo went public 2026-05-21 to keep
# CI running under the GitHub Actions quota; ANY past or current secret
# in a commit is now visible to the world.  This workflow runs gitleaks
# on every push and PR to catch a new committed secret BEFORE merge,
# and uploads SARIF to GitHub code-scanning so findings show in the
# Security tab.
#
# Baseline audit: docs/audits/2026-05-21-public-repo-secret-audit.md
# (full history scan clean — 0 critical, 0 review).  Allowlist for the
# three confirmed-clean test fixtures lives in .gitleaks.toml /
# .gitleaksignore (committed alongside this workflow).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # SARIF upload to code-scanning
  # S5 (2026-06-01) — back-port from trellis-dev-system D0g:
  # ``codeql-action/upload-sarif@v3`` issues a workflow-runs read
  # against the GitHub REST API for fingerprinting + duplicate
  # detection. Without ``actions: read`` the upload step errors with
  # "Resource not accessible by integration" and fails the job even
  # when the underlying gitleaks scan was clean.
  actions: read

jobs:
  gitleaks:
    name: gitleaks (worktree + SARIF)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks on the worktree (`--no-git`) is what the local
          # pre-commit hook also runs — same gate, two surfaces.  A
          # full git-history scan (``--source .`` without ``--no-git``)
          # is the operator's manual baseline (see audit doc); CI does
          # not run it every push because the cost grows with history
          # and the per-PR worktree scan is sufficient to keep new
          # commits clean.
          fetch-depth: 1

      # Pin gitleaks to a specific binary release rather than ``latest``
      # — supply-chain hygiene (an ``apt install`` or ``brew install``
      # without a version pin is a trust-anchor on whatever upstream
      # publishes next).  Bump deliberately when the release notes
      # show a relevant rule change.
      - name: Install gitleaks 8.30.1
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.30.1
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (SARIF for code-scanning + JSON for log)
        id: scan
        run: |
          set -euo pipefail
          # ``--exit-code 1`` (gitleaks 8.x default) reds the workflow
          # on ANY un-allowlisted hit, which is what we want for the
          # gate.  ``--no-banner`` keeps the log small enough to read
          # on red.  ``--redact`` masks the matched value in the SARIF
          # so an inadvertent re-leak through code-scanning doesn't
          # republish the secret content.
          gitleaks detect \
            --source . \
            --no-git \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path /tmp/gitleaks.sarif \
            --redact \
            --no-banner
          # Emit a JSON report alongside for easier human triage when
          # the SARIF upload step (next) is what surfaces in the UI.
          gitleaks detect \
            --source . \
            --no-git \
            --config .gitleaks.toml \
            --report-format json \
            --report-path /tmp/gitleaks.json \
            --redact \
            --no-banner

      - name: Upload SARIF to code-scanning
        # ``always()`` so a red scan still publishes the findings to
        # the Security tab; without it, GitHub never sees what
        # tripped the gate.
        #
        # S5 (2026-06-01) — back-port from trellis-dev-system D0g:
        # ``continue-on-error: true`` makes SARIF upload best-effort
        # enrichment, not a load-bearing gate. If GitHub code-scanning
        # is unavailable for any reason (Advanced Security disabled,
        # transient API outage, permissions drift), the workflow
        # still passes — the actual gate is the gitleaks SCAN step
        # above, which exits 1 on any un-allowlisted hit. Without
        # continue-on-error a code-scanning hiccup would red the
        # workflow even when the scan itself was clean.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/gitleaks.sarif
          category: gitleaks

      - name: Upload JSON report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: /tmp/gitleaks.json
          retention-days: 14

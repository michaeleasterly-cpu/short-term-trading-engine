recent_removals:
  # 2023 banking crisis
  - ticker: SIVBQ
    removed_date: 2023-03-15
    reason: bankruptcy
    expect_delisted: true
  - ticker: FRC
    removed_date: 2023-05-04
    reason: receivership
    expect_delisted: true
  # 2023 retail bankruptcy
  - ticker: BBBYQ
    removed_date: 2022-04-18
    reason: bankruptcy
    expect_delisted: true
  # 2023 large-cap acquisitions
  - ticker: ATVI
    removed_date: 2023-10-13
    reason: acquired_by_msft
    expect_delisted: true
  - ticker: VMW
    removed_date: 2023-11-22
    reason: acquired_by_avgo
    expect_delisted: true
  # 2024
  - ticker: SPLK
    removed_date: 2024-03-18
    reason: acquired_by_csco
    expect_delisted: true
  - ticker: FTCH
    removed_date: 2024-01-30
    reason: acquired_by_coupang
    expect_delisted: true
  - ticker: TUP
    removed_date: 2024-09-17
    reason: bankruptcy
    expect_delisted: true
  # NOTE: HTZGQ / WLLBQ / LK / SBNYQ / SI removed from both this
  # fixture and delistings.yaml on 2026-05-10. Audit confirmed no
  # free-tier source (Alpaca free, Tradier export) carries bars for
  # these tickers; they are unresolvable until a paid delisted-feed is
  # provisioned. Re-add when such a feed lands.

"tpcore/tests/test_compute_fundamental_ratios_stage.py" = ["SLF"]
"tpcore/tests/test_compare_baselines_stage.py" = ["SLF"]
"tpcore/tests/test_aar_pipeline_smoke_stage.py" = ["SLF"]
"tpcore/tests/test_kill_switch_smoke_stage.py" = ["SLF"]
"tpcore/tests/test_extract_tradier_full_stage.py" = ["SLF"]
"tpcore/tests/test_ingest_tradier_csv_stage.py" = ["SLF"]
# Lab final-holdout chunking test (statement_timeout fix, 2026-05-21).
# Proving the chunked replay partitions the holdout disjointly + does

# Constituent snapshot for the Data Validation Suite.
#
# `current_sp500` is a hand-curated subset of S&P 500 names — the largest
# market caps plus a sector-balanced sample. The check requires every name
# here to be present in `platform.prices_daily` with a bar within the last
# 5 trading days (proves daily ingestion is alive). Refresh manually when
# you want to expand coverage; the master plan §6.3 only commits to a
# snapshot + recent removals for MVP.
#
# `recent_removals` is the survivorship-bias coverage set: names that were
# removed from the index (or simply matter for bias correction) and should
# still appear in `platform.prices_daily`, marked `delisted=true` where
# applicable.


name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs when a newer commit arrives on the same ref —
# avoids burning minutes on outdated commits while the operator rapid-fires
# pushes (which has happened more than once).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + ruff + check_imports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # CI runs on Python 3.13 to match Railway's mise default — the
          # platform's runtime is 3.13.x, so testing here on the same major
          # eliminates "passed CI, crashed in prod" version drift.
          # pyproject.toml's requires-python = ">=3.11" still permits 3.11
          # for local dev; production / CI commit to 3.13.
          python-version: "3.13"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run forbidden-imports check
        run: python -m tpcore.scripts.check_imports sigma reversion vector tpcore

      - name: Run ruff
        run: python -m ruff check sigma/ reversion/ vector/ tpcore/ scripts/

      - name: Run pytest
        run: python -m pytest -q

# Pre-commit hook config — local secret-scan + ruff gate.
#
# Optional adoption (the CI gate in .github/workflows/secret-scan.yml is
# the authoritative line of defense), but installing it locally catches
# a leak BEFORE it lands on GitHub — meaningful for a public repo where
# even a brief push leaks the secret to the public timeline.
#
# Setup (one-time, per operator workstation):
#
#     pip install pre-commit
#     pre-commit install
#
# Then every ``git commit`` runs the hooks against staged files.  To
# bypass (emergency only), ``git commit --no-verify``.
#
# Hooks are pinned to specific revs (NOT a moving tag).  Bump
# deliberately and re-test; ``pre-commit autoupdate`` rewrites the rev
# line — review the diff before committing.

repos:
  # gitleaks — secret scanner.  Pinned to v8.30.1 (matches the CI gate
  # in .github/workflows/secret-scan.yml; bump both together).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        # The committed .gitleaks.toml + .gitleaksignore are the same
        # config CI uses; the hook auto-discovers .gitleaks.toml in the
        # repo root.
        name: gitleaks (staged-file secret scan)

  # ruff — same linter the ci.yml uses, run pre-commit to short-circuit
  # the obvious red.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.4
    hooks:
      - id: ruff
        args: [--fix]

  # Local manifest-linter — verifies the .claude extension surface
  # (hooks in settings.json resolve to existing scripts, every skill
  # directory has SKILL.md, rule/agent frontmatter, the heavy-lane
  # paths in .claude/rules/heavy-lane.md match .claude/path_registry.yaml,
  # and the vocabulary pinned in the presence-sentinel tests is on
  # disk). Modeled after Anthropic financial-services/scripts/check.py.
  # Sentinel: tests/test_manifest_check_present.py.
  - repo: local
    hooks:
      - id: check-manifests
        name: check-manifests (STE extension-surface reference integrity)
        entry: python scripts/check_manifests.py
        language: system
        pass_filenames: false
        always_run: true

      # Pre-PUSH test gate — runs the authoritative whole-suite gate before any
      # push, so a push is known-clean (closes the "committed/pushed without
      # running the gate" gap). Runs ONLY on push, not on every commit.
      # Activate (once): pre-commit install --hook-type pre-push
      # Bypass (emergency): STE_SKIP_PREPUSH=1 git push   (or git push --no-verify)
      - id: pytest-prepush-gate
        name: pytest whole-suite gate (pre-push)
        entry: bash scripts/run_prepush_gate.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs when a newer commit arrives on the same ref —
# avoids burning minutes on outdated commits while the operator rapid-fires
# pushes (which has happened more than once).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + ruff + check_imports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # CI runs on Python 3.11 to match the .python-version pin
          # (Railway/Railpack also honors this file). Single source of truth
          # avoids "passed CI on 3.X, crashed on 3.Y" version drift.
          python-version-file: .python-version
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run forbidden-imports check
        run: python -m tpcore.scripts.check_imports reversion vector momentum sentinel canary tpcore

      - name: Run ruff
        run: python -m ruff check reversion/ vector/ momentum/ sentinel/ canary/ tpcore/ scripts/ ops/

      - name: Run pytest
        run: python -m pytest -q

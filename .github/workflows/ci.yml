name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs when a newer commit arrives on the same ref —
# avoids burning minutes on outdated commits while the operator rapid-fires
# pushes (which has happened more than once).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + ruff + check_imports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # CI runs on Python 3.11 to match the .python-version pin
          # (Railway/Railpack also honors this file). Single source of truth
          # avoids "passed CI on 3.X, crashed on 3.Y" version drift.
          python-version-file: .python-version
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run forbidden-imports check
        run: python -m tpcore.scripts.check_imports reversion vector momentum sentinel canary catalyst tpcore

      - name: Run ruff
        run: python -m ruff check reversion/ vector/ momentum/ sentinel/ canary/ catalyst/ tpcore/ scripts/ ops/

      # Dead-code gate. Complements ruff F401/F841 (unused imports/locals
      # only) by catching unused functions/methods/classes/attributes.
      # Allowlist-BASELINED: vulture_allowlist.py encodes today's
      # intentional dark / feature-flagged code (canary non-graduation,
      # LLM-triage fenced paths). This step fails ONLY on NEW
      # un-allowlisted dead code — the committed tree is clean day one.
      # --min-confidence 60 is LOAD-BEARING, not arbitrary: vulture 2.16
      # reports an unused MODULE-LEVEL FUNCTION (the primary dead-code
      # class) at only 60% confidence, so --min-confidence 80 SUPPRESSES
      # it and the gate is structurally inert (a fresh dead function
      # yields EXIT 0 — fake green). 60 is the lowest threshold at which
      # a newly-added unused module-level function reliably exits
      # non-zero (empirically verified on the installed vulture 2.16).
      - name: vulture (fail on new dead code)
        run: vulture --min-confidence 60 tpcore ops reversion vector momentum sentinel canary catalyst dashboard_components vulture_allowlist.py

      # Fast accelerator: pytest-xdist with --dist loadgroup keeps the
      # ops-shadow modules (xdist_group("ops_shadow")) on one worker so
      # their single-process sys.modules['ops'] invariant holds, while
      # cross-module poisoning is per-worker process-isolated. This is
      # NEVER the sole gate (live-money invariant) — the authoritative
      # serial + order-flip step below is the gate of record.
      - name: pytest (parallel accelerator)
        run: python -m pytest -n auto --dist loadgroup -q

      # AUTHORITATIVE correctness gate: the whole suite in ONE process
      # (the ops/ package-shadow sys.modules poisoning + the streamlit
      # "no dashboard.py import in CI" hazard are single-process
      # properties) plus the order-flip pair both directions.
      - name: pytest serial + order-flip (AUTHORITATIVE gate)
        run: |
          python -m pytest -p no:xdist -q
          python -m pytest -p no:xdist -q tpcore/tests/test_ops.py tpcore/tests/test_ops_helpers.py tests/test_defect_register.py
          python -m pytest -p no:xdist -q tests/test_defect_register.py tpcore/tests/test_ops_helpers.py tpcore/tests/test_ops.py

  # 2026-05-22 — The LLM-triage deterministic-fence jobs (data lane +
  # engine lane) and the fail-closed agent-PR label guard have been
  # REMOVED. Operator directive ("we aren't going to use the llm
  # triage... take it out") deleted the entire LLM-triage stack from
  # the repo (``ops.llm_data_triage``, ``ops.engine_llm_triage``,
  # ``ops.llm_data_recovery``, ``tpcore.llm_data_triage``,
  # ``tpcore.engine_llm_triage``, ``scripts/llm_triage_pr_check.py``,
  # ``scripts/agent_pr_label_guard.py``). There is no LLM-triage path
  # left to fence; the deterministic cascade catalog (Waves 1-4 +
  # sentinel) is the COMPLETE self-heal layer.

  # Lab-isolation DB-gated CI job. The `test` job above runs WITHOUT a
  # Postgres service, so five suites currently `pytest.skipif` at
  # collection time when `DATABASE_URL` / `RUN_DB_INTEGRATION_TESTS` are
  # absent:
  #   - tpcore/tests/test_db_read_only.py        (skipif DATABASE_URL is None)
  #   - tpcore/tests/test_lab_isolation.py       (skipif DATABASE_URL is None)
  #   - tpcore/tests/test_persistent_store.py    (skipif RUN_DB_INTEGRATION_TESTS)
  #   - tpcore/tests/test_fundamentals_cache.py  (skipif RUN_DB_INTEGRATION_TESTS)
  #   - tpcore/tests/test_aar_writer.py          (skipif RUN_DB_INTEGRATION_TESTS)
  # This sibling job provisions Postgres 15 via the GitHub Actions
  # `services:` block (free-tier runners only — no self-hosted), applies
  # the alembic migration stack against the freshly-provisioned DB, and
  # runs ONLY those five files with the env vars set so the skips do not
  # fire. The existing `test` job is intentionally LEFT ALONE: it keeps
  # its no-DB behaviour and continues to skip these suites; this job is
  # the place where they actually execute. `-p no:cacheprovider` matches
  # the project's full-suite pattern (no `-n`, no `-x`).
  # GitHub Actions `services:` syntax reference:
  #   <https://docs.github.com/en/actions/using-containerized-services/about-service-containers>
  lab-isolation-db:
    name: lab-isolation-db (Postgres-gated suites)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: ste_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # SQLAlchemy-style URL: alembic's env.py reads $DATABASE_URL and
      # passes it through `async_engine_from_config` (asyncpg driver),
      # while `tpcore.db.build_asyncpg_pool` accepts the same shape and
      # strips the `+asyncpg` suffix internally. Single SoT for both
      # migration + test sides.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ste_test
      RUN_DB_INTEGRATION_TESTS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match the existing `test` job: pin from .python-version (the
          # Railway/Railpack SoT — never drift the CI Python version
          # between jobs).
          python-version-file: .python-version
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Bootstrap platform schema (alembic version table lives in 'platform')
        # platform/migrations/env.py sets version_table_schema="platform", so
        # alembic tries to CREATE platform.alembic_version BEFORE running the
        # first migration (which is what would create the schema). Pre-create
        # the schema here to break the chicken-and-egg on a fresh DB.
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d ste_test \
            -c "CREATE SCHEMA IF NOT EXISTS platform;"

      - name: Apply alembic migrations
        run: alembic -c platform/migrations/alembic.ini upgrade head

      - name: Run DB-isolated suites
        run: |
          python -m pytest -p no:cacheprovider \
            tpcore/tests/test_db_read_only.py \
            tpcore/tests/test_lab_isolation.py \
            tpcore/tests/test_persistent_store.py \
            tpcore/tests/test_fundamentals_cache.py \
            tpcore/tests/test_aar_writer.py \
            tpcore/tests/test_handle_fundamentals_archive_db_schema.py

  # 2026-05-22 — the fail-CLOSED agent-PR label guard job has been
  # REMOVED. Operator directive ("we aren't going to use the llm
  # triage... take it out") deleted ``scripts/agent_pr_label_guard.py``
  # along with the LLM-triage stack. There is no agent-produced
  # triage PR to guard against.

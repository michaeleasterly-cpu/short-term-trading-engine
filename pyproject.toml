[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "short-term-trading-engine"
version = "0.0.1"
description = "Multi-engine quantitative trading platform with shared core (tpcore), platform schema, and pluggable engines."
requires-python = ">=3.11,<3.12"
readme = "README.md"
license = { text = "Proprietary" }
authors = [{ name = "STE Team" }]

dependencies = [
    "pydantic>=2.6,<3",
    "pydantic-settings>=2.2",
    "structlog>=24.1",
    "asyncpg>=0.29",
    "psycopg[binary,pool]>=3.1",
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "exchange_calendars>=4.5",
    "httpx>=0.27",
    "python-dotenv>=1.0",
    "tenacity>=8.2",
    "numpy>=1.26",
    "pandas>=2.2",
    "alpaca-py>=0.30",
    "PyYAML>=6.0",
    "scipy>=1.11",
    "croniter>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
]
dashboard = [
    # Operator dashboard — see docs/superpowers/specs/2026-05-13-operator-dashboard.md.
    # Streamlit pinned <1.50 because the chart-library wrapper
    # (streamlit-lightweight-charts-pro, used in Phase 3 of the dashboard)
    # is at 0.x and minor-bump compatibility isn't proven.
    "streamlit>=1.30,<1.50",
    "streamlit-lightweight-charts-pro>=0.3.0",
]

[project.scripts]
ste-check-imports = "tpcore.scripts.check_imports:main"

[tool.setuptools.packages.find]
# NOTE: ``platform/`` is intentionally NOT a Python package — that name shadows
# the stdlib ``platform`` module (used transitively by pandas/exchange_calendars).
# It contains only Alembic migration files which are loaded by path, not import.
include = ["tpcore*", "sigma*", "reversion*", "vector*", "momentum*"]
exclude = ["tests*"]

[tool.setuptools.package-data]
# Validation suite ships hand-curated YAML fixtures alongside the code.
"tpcore.quality.validation" = ["fixtures/*.yaml"]

[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# `l` for "low" is a natural OHLC variable name in test fixtures; the rule
# (E741: ambiguous variable name) targets production code where one-letter
# names hurt readability, not synthetic-bar generators.
"**/tests/**" = ["E741"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

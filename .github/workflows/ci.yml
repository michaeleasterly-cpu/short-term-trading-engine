name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs when a newer commit arrives on the same ref —
# avoids burning minutes on outdated commits while the operator rapid-fires
# pushes (which has happened more than once).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + ruff + check_imports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # CI runs on the latest Python 3.11.x — pyproject.toml's
          # requires-python = ">=3.11" is the contract. Local .venv is also
          # 3.11.15. Railway/Railpack picks its own version (mise default);
          # we don't over-constrain so the runtime image's Python install
          # path remains whatever Railpack expects to preserve at runtime.
          python-version: "3.11"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run forbidden-imports check
        run: python -m tpcore.scripts.check_imports sigma reversion vector tpcore

      - name: Run ruff
        run: python -m ruff check sigma/ reversion/ vector/ tpcore/ scripts/

      - name: Run pytest
        run: python -m pytest -q

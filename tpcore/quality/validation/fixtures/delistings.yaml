# Hand-curated delisting fixtures for the Data Validation Suite.
#
# Each entry is a public delisting reachable via Alpaca's `status=inactive`
# asset listing. Mix of bankruptcies and acquisitions across 2020–2024.
# `delisting_date` is the recorded effective delisting date — the check
# tolerates ±5 trading days against the observed last bar (Alpaca's
# bootstrap infers the date from the last bar, so exact equality is rare).
#
# `alt_tickers` lists symbols the same security may have traded under
# (often the pre-bankruptcy primary, before the post-petition "Q" suffix).
# The check passes if any of [ticker] + alt_tickers satisfies the four
# conditions in spec §3.1.
#
# Maintenance: when adding entries, prefer events ≥ 2018 (Alpaca free-tier
# coverage) and try to keep at least one event per cause/period.

# NOTE: The 2020 pandemic-era bankruptcies (HTZGQ, WLLBQ, LK) and the
# Signature Bank entry (SBNYQ) were removed from this fixture on
# 2026-05-10 after a definitive audit confirmed neither Alpaca free tier
# nor the Tradier export contained any bars for them. They are
# unresolvable on free-tier data; re-add only when a paid feed with
# delisted-symbol coverage is provisioned. See OPERATIONS.md §6.

# 2023 — regional banking crisis + post-COVID retail bankruptcies
- ticker: SIVBQ
  alt_tickers: [SIVB]
  delisting_date: 2023-03-09
  reason: bankruptcy
  notes: "SVB Financial Group — Chapter 11 after FDIC takeover; last IEX bar 2023-03-09"


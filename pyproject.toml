# `# noqa: SLF001` (CLAUDE.md / STYLE_GUIDE).
"vector/tests/test_composite_flag_byte_identical.py" = ["SLF"]
# Orphan-script zero-allowlist migration tests (2026-05-21). Each
# stage test asserts the new ``ops.py``-private ``_stage_<name>``
# coroutine is registered in ``_STAGE_SPECS`` + ``KNOWN_STAGES`` and

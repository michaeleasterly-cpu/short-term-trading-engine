# Railpack build configuration.
#
# Install deps globally to the system Python's site-packages. The earlier
# venv-based approach (`python -m venv /app/.venv && /app/.venv/bin/pip
# install -e .`) failed at runtime because Railpack's multi-stage build
# didn't preserve /app/.venv into the runtime image, even with an
# explicit [runtime] paths entry. Going back to a global install means
# the runtime image's system Python finds the deps directly.

[build]
install_command = "pip install -e ."

[runtime]
paths = ["/usr/local/lib/python3.13/site-packages"]

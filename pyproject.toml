[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "short-term-trading-engine"
version = "0.0.1"
description = "Multi-engine quantitative trading platform with shared core (tpcore), platform schema, and pluggable engines."
requires-python = ">=3.11"
readme = "README.md"
license = { text = "Proprietary" }
authors = [{ name = "STE Team" }]

dependencies = [
    "pydantic>=2.6,<3",
    "pydantic-settings>=2.2",
    "structlog>=24.1",
    "asyncpg>=0.29",
    "psycopg[binary,pool]>=3.1",
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "exchange_calendars>=4.5",
    "httpx>=0.27",
    "python-dotenv>=1.0",
    "tenacity>=8.2",
    "numpy>=1.26",
    "pandas>=2.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
ste-check-imports = "tpcore.scripts.check_imports:main"

[tool.setuptools.packages.find]
# NOTE: ``platform/`` is intentionally NOT a Python package — that name shadows
# the stdlib ``platform`` module (used transitively by pandas/exchange_calendars).
# It contains only Alembic migration files which are loaded by path, not import.
include = ["tpcore*", "sigma*"]
exclude = ["tests*"]

[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

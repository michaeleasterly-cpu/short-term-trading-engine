name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs when a newer commit arrives on the same ref —
# avoids burning minutes on outdated commits while the operator rapid-fires
# pushes (which has happened more than once).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + ruff + check_imports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # CI runs on Python 3.11 to match the .python-version pin
          # (Railway/Railpack also honors this file). Single source of truth
          # avoids "passed CI on 3.X, crashed on 3.Y" version drift.
          python-version-file: .python-version
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run forbidden-imports check
        run: python -m tpcore.scripts.check_imports reversion vector momentum sentinel canary catalyst tpcore

      - name: Run ruff
        run: python -m ruff check reversion/ vector/ momentum/ sentinel/ canary/ catalyst/ tpcore/ scripts/ ops/

      # Dead-code gate. Complements ruff F401/F841 (unused imports/locals
      # only) by catching unused functions/methods/classes/attributes.
      # Allowlist-BASELINED: vulture_allowlist.py encodes today's
      # intentional dark / feature-flagged code (canary non-graduation,
      # LLM-triage fenced paths). This step fails ONLY on NEW
      # un-allowlisted dead code — the committed tree is clean day one.
      # --min-confidence 60 is LOAD-BEARING, not arbitrary: vulture 2.16
      # reports an unused MODULE-LEVEL FUNCTION (the primary dead-code
      # class) at only 60% confidence, so --min-confidence 80 SUPPRESSES
      # it and the gate is structurally inert (a fresh dead function
      # yields EXIT 0 — fake green). 60 is the lowest threshold at which
      # a newly-added unused module-level function reliably exits
      # non-zero (empirically verified on the installed vulture 2.16).
      - name: vulture (fail on new dead code)
        run: vulture --min-confidence 60 tpcore ops reversion vector momentum sentinel canary catalyst dashboard_components vulture_allowlist.py

      # Fast accelerator: pytest-xdist with --dist loadgroup keeps the
      # ops-shadow modules (xdist_group("ops_shadow")) on one worker so
      # their single-process sys.modules['ops'] invariant holds, while
      # cross-module poisoning is per-worker process-isolated. This is
      # NEVER the sole gate (live-money invariant) — the authoritative
      # serial + order-flip step below is the gate of record.
      - name: pytest (parallel accelerator)
        run: python -m pytest -n auto --dist loadgroup -q

      # AUTHORITATIVE correctness gate: the whole suite in ONE process
      # (the ops/ package-shadow sys.modules poisoning + the streamlit
      # "no dashboard.py import in CI" hazard are single-process
      # properties) plus the order-flip pair both directions.
      - name: pytest serial + order-flip (AUTHORITATIVE gate)
        run: |
          python -m pytest -p no:xdist -q
          python -m pytest -p no:xdist -q tpcore/tests/test_ops.py tpcore/tests/test_ops_helpers.py tests/test_defect_register.py
          python -m pytest -p no:xdist -q tests/test_defect_register.py tpcore/tests/test_ops_helpers.py tpcore/tests/test_ops.py

  # LLM-data-triage deterministic fence. Label-gated: runs ONLY on a
  # pull_request that carries the 'llm-data-triage' label, so non-LLM
  # PRs are completely unaffected. The fence is DETERMINISTIC and
  # credential-STARVED — it must NEVER reference any LLM API key or
  # any secret (the LLM's self-judgement gates nothing; artifact
  # properties do). On failure it auto-closes the PR + escalates.
  llm-triage-fence:
    name: llm-data-triage deterministic fence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'llm-data-triage')

    steps:
      - uses: actions/checkout@v4
        with:
          # Need the base ref for the diff-based fence checks.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run LLM-triage deterministic fence
        run: python scripts/llm_triage_pr_check.py

      - name: Auto-close + escalate on fence failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body \
            "🚫 LLM-data-triage deterministic fence FAILED — this draft \
            PR proposed a non-additive / new-mechanism / hard-denied \
            change. Auto-closing. The escalation stays open for a human; \
            restoration only ever happens via the deterministic path."
          gh pr close "${{ github.event.pull_request.number }}"

  # Engine-lane LLM-triage deterministic fence (Epic E Phase 3.2).
  # Additive + label-gated on the SEPARATE 'engine-llm-triage' label
  # (the data-lane 'llm-data-triage' job above is UNTOUCHED). Same
  # mechanism, engine registries: baseline =
  # ops.engine_ladder.DISPOSITION_POLICIES (an additive binding must
  # point at an ALREADY-EXISTING EngineEscalationDisposition verb) +
  # the engine hard-denied path set (engine deterministic-mechanism
  # files + shared protected paths). DETERMINISTIC and credential-
  # STARVED — like the data job it MUST NEVER reference any LLM API key
  # or any secret (the LLM's self-judgement gates nothing; artifact
  # properties do). On failure: auto-close + escalate (stays open for
  # a human; restoration only via the deterministic Ladder path).
  engine-llm-triage-fence:
    name: engine-llm-triage deterministic fence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'engine-llm-triage')

    steps:
      - uses: actions/checkout@v4
        with:
          # Need the base ref for the diff-based fence checks.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run engine-lane LLM-triage deterministic fence
        run: python scripts/llm_triage_pr_check.py --lane engine

      - name: Auto-close + escalate on fence failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body \
            "🚫 engine-llm-triage deterministic fence FAILED — this draft \
            PR proposed a non-additive / new-mechanism / new-disposition \
            / hard-denied change. Auto-closing. The escalation stays open \
            for a human; restoration only ever happens via the \
            deterministic Ladder path."
          gh pr close "${{ github.event.pull_request.number }}"

  # Lab-isolation DB-gated CI job. The `test` job above runs WITHOUT a
  # Postgres service, so five suites currently `pytest.skipif` at
  # collection time when `DATABASE_URL` / `RUN_DB_INTEGRATION_TESTS` are
  # absent:
  #   - tpcore/tests/test_db_read_only.py        (skipif DATABASE_URL is None)
  #   - tpcore/tests/test_lab_isolation.py       (skipif DATABASE_URL is None)
  #   - tpcore/tests/test_persistent_store.py    (skipif RUN_DB_INTEGRATION_TESTS)
  #   - tpcore/tests/test_fundamentals_cache.py  (skipif RUN_DB_INTEGRATION_TESTS)
  #   - tpcore/tests/test_aar_writer.py          (skipif RUN_DB_INTEGRATION_TESTS)
  # This sibling job provisions Postgres 15 via the GitHub Actions
  # `services:` block (free-tier runners only — no self-hosted), applies
  # the alembic migration stack against the freshly-provisioned DB, and
  # runs ONLY those five files with the env vars set so the skips do not
  # fire. The existing `test` job is intentionally LEFT ALONE: it keeps
  # its no-DB behaviour and continues to skip these suites; this job is
  # the place where they actually execute. `-p no:cacheprovider` matches
  # the project's full-suite pattern (no `-n`, no `-x`).
  # GitHub Actions `services:` syntax reference:
  #   <https://docs.github.com/en/actions/using-containerized-services/about-service-containers>
  lab-isolation-db:
    name: lab-isolation-db (Postgres-gated suites)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: ste_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # SQLAlchemy-style URL: alembic's env.py reads $DATABASE_URL and
      # passes it through `async_engine_from_config` (asyncpg driver),
      # while `tpcore.db.build_asyncpg_pool` accepts the same shape and
      # strips the `+asyncpg` suffix internally. Single SoT for both
      # migration + test sides.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ste_test
      RUN_DB_INTEGRATION_TESTS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match the existing `test` job: pin from .python-version (the
          # Railway/Railpack SoT — never drift the CI Python version
          # between jobs).
          python-version-file: .python-version
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Apply alembic migrations
        run: alembic -c platform/migrations/alembic.ini upgrade head

      - name: Run DB-isolated suites
        run: |
          python -m pytest -p no:cacheprovider \
            tpcore/tests/test_db_read_only.py \
            tpcore/tests/test_lab_isolation.py \
            tpcore/tests/test_persistent_store.py \
            tpcore/tests/test_fundamentals_cache.py \
            tpcore/tests/test_aar_writer.py

  # Fail-CLOSED agent-PR label guard (MED security fix). The two fence
  # jobs above are LABEL-GATED — they run ONLY when the agent's own
  # automation applied the label. Failure mode = fail-OPEN: an
  # agent-produced draft PR that omits/loses the label triggers NEITHER
  # fence and merges UNFENCED. This ADDITIVE job (the existing fence
  # jobs are UNTOUCHED — the engine fence is co-owned by another
  # session) closes that hole: it runs on EVERY pull_request and FAILS
  # iff the PR is agent-produced (head ref ~ `llm-triage/*` OR commits a
  # docs/{llm_triage_proposals,engine_llm_triage_proposals}/ provenance
  # artifact — the signals the agent's _open_draft_pr cannot both emit
  # and suppress) yet carries NEITHER fence label. A human maintenance
  # PR to the same files (e.g. #97/#98) has no agent signal ⇒ no-op
  # pass. Pure-deterministic, NO secrets, read-only token,
  # `pull_request` (NOT pull_request_target) — same hardening as the
  # fence jobs.
  agent-pr-label-guard:
    name: fail-closed agent-PR label guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the base ref for the diff-based agent-artifact check
          # (mirrors the fence jobs' fetch-depth).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Run fail-closed agent-PR label guard
        env:
          GUARD_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GUARD_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          GUARD_CHANGED_PATHS="$(git -c core.quotepath=false diff \
            --name-only \
            "origin/${{ github.event.pull_request.base.ref }}...HEAD")"
          export GUARD_CHANGED_PATHS
          python scripts/agent_pr_label_guard.py

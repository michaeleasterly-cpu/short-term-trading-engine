name: deploy-window
# Hard-blocks Railway deployments during critical operational windows.
#
# Pairs with Railway's "Wait for CI" toggle (on every service in this
# project). When this workflow fails, Railway sets the would-be deploy
# to SKIPPED and the running container keeps serving the previous
# revision unmolested.
#
# Critical windows (UTC):
#   * Mon-Fri 13:30 - 20:00  — NYSE regular session. trade-monitor is
#                              live on the Alpaca trade_updates
#                              websocket; restart drops the connection
#                              and the gap may swallow fills.
#   * Mon-Fri 21:30 - 23:30  — data-operations cron + downstream
#                              cascade. data-ops runs 21:30 UTC, takes
#                              ~30-60 min, emits DATA_OPERATIONS_COMPLETE;
#                              engine-service polls (60s) and dispatches
#                              the engine sweep; restart kills the
#                              cycle, loses the event chain, and the
#                              next cycle is 24h away.
#
# Safe windows:
#   * Weekends (any hour)
#   * Weekday 00:00 - 13:30 UTC  (pre-market US)
#   * Weekday 20:00 - 21:30 UTC  (90 min between close and data-ops)
#   * Weekday 23:30 - 24:00 UTC  (after data-ops cascade)
#
# This is a hard gate. There is no override flag here by design — the
# operator's directive (2026-05-26): "don't force a deployment".

on:
  push:
    branches: [main]

jobs:
  deploy-window:
    runs-on: ubuntu-latest
    steps:
      - name: Block deploys during critical operational windows
        run: |
          set -euo pipefail
          dow=$(date -u +%u)     # 1=Mon..7=Sun
          hhmm=$(date -u +%H%M)  # 0000..2359
          dow_name=$(date -u +%a)
          ts_utc=$(date -u --iso-8601=seconds)

          echo "Now: ${ts_utc}  (UTC weekday=${dow_name}, HHMM=${hhmm})"

          # Weekends — always allow.
          if [ "$dow" -ge 6 ]; then
            echo "✓ Weekend: deploys allowed"
            exit 0
          fi

          # Weekday — block NYSE regular session 13:30-20:00 UTC.
          if [ "$hhmm" -ge 1330 ] && [ "$hhmm" -lt 2000 ]; then
            echo "✗ BLOCKED: NYSE regular session (13:30-20:00 UTC Mon-Fri)"
            echo "  trade-monitor websocket would be dropped mid-session."
            echo "  Wait until 20:00 UTC."
            exit 1
          fi

          # Weekday — block data-ops cascade 21:30-23:30 UTC.
          if [ "$hhmm" -ge 2130 ] && [ "$hhmm" -lt 2330 ]; then
            echo "✗ BLOCKED: data-operations cron + engine sweep cascade (21:30-23:30 UTC Mon-Fri)"
            echo "  Restart kills the daily DATA_OPERATIONS_COMPLETE event chain."
            echo "  Wait until 23:30 UTC."
            exit 1
          fi

          echo "✓ Outside critical windows: deploys allowed"

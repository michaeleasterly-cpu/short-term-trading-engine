# Constituent snapshot for the Data Validation Suite.
#
# `current_sp500` is the subset of S&P 500 names that we *also* hold in
# `platform.prices_daily` — i.e. the names the daily ingestion is
# actively keeping fresh. It deliberately matches the 50-name backtest
# universe (minus ETFs SPY/QQQ/IWM, which aren't S&P 500 but ARE in
# prices_daily). Master plan §6.3 commits to "snapshot + recent removals"
# for MVP; we'll expand the snapshot when the bootstrap pulls more names.
#
# Names not in `prices_daily` are correctly flagged "missing" by the
# check, and that's a useful signal — but for the gate we only want to
# verify the *active* universe is alive. Including names we don't
# ingest would produce noise without value.
#
# `recent_removals` is the survivorship-bias coverage set: names that
# were removed from the index (or simply matter for bias correction) and
# should still appear in `platform.prices_daily`, marked `delisted=true`.

current_sp500_snapshot_date: 2026-05-10

current_sp500:
  # ETFs (not S&P 500 constituents but are in prices_daily; keep so the
  # freshness check exercises them too)
  - SPY
  - QQQ
  - IWM
  # Mega-cap tech
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - META
  - NVDA
  - TSLA
  # Financials
  - JPM
  - V
  # Consumer
  - WMT
  - DIS
  - NFLX
  - HD

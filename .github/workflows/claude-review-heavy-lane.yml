name: Claude Review — Heavy Lane

# Path-filtered Claude Code Action review for the heavy-lane paths
# enumerated in docs/DEV_PIPELINE_STANDARD.md §0 and pinned in
# .claude/rules/heavy-lane.md. Review-only / comment-only — the action
# is NEVER granted repo-write permission, and the prompt explicitly prohibits
# code changes, auto-fix, auto-merge, trading-logic recommendations,
# and memory writes.
#
# The action posts a verdict comment (PASS / REQUEST_CHANGES /
# NEEDS_OPERATOR_REVIEW). The operator remains the final gate; this
# workflow is a first-pass reviewer that frees the manual subagent
# dispatch loop from running on every heavy-lane PR.
#
# Authoritative external references:
#   - https://github.com/anthropics/claude-code-action
#   - https://docs.anthropic.com/en/docs/claude-code/github-actions
#   - examples/pr-review-filtered-paths.yml from the upstream repo
#
# Adoption: the action requires ANTHROPIC_API_KEY in repo secrets.
# S5 (2026-06-01) — back-port from packetvoid-dev-system D2:
# the workflow auto-detects whether the secret is configured and
# **gracefully no-ops when it is missing** — the manual fresh-context
# heavy-lane review discipline in docs/DEV_PIPELINE_STANDARD.md §1
# step 7 remains the dispositive gate. This means a missing or
# rotated secret no longer poisons every heavy-lane PR with a hard-
# fail; the operator sees a workflow notice and the job passes.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      # ─────────────────────────────────────────────────────────────
      # H0 (2026-06-01) — SoT is .claude/path_registry.yaml.
      # The list below MUST equal exactly:
      #   groups.heavy_lane.paths ∪ groups.claude_system.paths
      # Adding a path in only one of (registry, this filter) reds CI
      # via scripts/check_manifests.py +
      # tests/test_path_registry_present.py.
      # ─────────────────────────────────────────────────────────────
      # heavy_lane (capital-gate / data-acceptance / SDLC mutators)
      - "tpcore/risk/**"
      - "tpcore/selfheal/**"
      - "tpcore/auditheal/**"
      - "tpcore/quality/validation/**"
      - "ops/engine_service.py"
      - "ops/engine_sdlc.py"
      - "ops/engine_sdlc/**"
      - "ops/data_feed_sdlc/**"
      - "ops/cutover_agent.py"
      - "scripts/ops.py"
      - "platform/migrations/**"
      - "tpcore/engine_profile.py"
      - "tpcore/providers.py"
      # claude_system (extension-layer behavior surface)
      - ".claude/rules/**"
      - ".claude/skills/**"
      - ".claude/agents/**"
      - ".claude/hooks/**"
      - ".claude/settings.json"
      - ".github/workflows/**"

# Cancel an older in-flight review when a new commit lands on the same
# PR branch — matches the existing ci.yml concurrency discipline so
# operator rapid-fire pushes don't pile up review jobs.
concurrency:
  group: claude-review-heavy-lane-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude review (heavy-lane paths)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Minimal permissions block. Write access to repo contents is
    # NOT granted — the action is a review-only / comment-only
    # first-pass reviewer. If a future use-case needs commits or
    # patches, that is a separate workflow with operator-explicit
    # authorization.
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Gate on ANTHROPIC_API_KEY presence
        id: gate
        # S5 (2026-06-01) — back-port from packetvoid-dev-system D2.
        # GitHub Actions does not allow referencing ``secrets`` in
        # job-level ``if:`` conditionals. The standard portable pattern
        # is: expose the secret-presence boolean via an env var on a
        # guard step, write a ``skip`` output, then gate downstream
        # steps on that output.
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ]; then
            echo "::notice::ANTHROPIC_API_KEY secret is not configured on this repository; skipping the Claude review action. The manual fresh-context review discipline in docs/DEV_PIPELINE_STANDARD.md §1 step 7 remains the dispositive gate. Set the secret under Settings → Secrets and variables → Actions to enable automated first-pass review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository (PR head, shallow)
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # The action runs against the PR head; we never need history.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Claude Code Action review (review-only / no commits)
        if: steps.gate.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Restrict tool surface to commenting only — no shell, no
          # file write, no git operations. The action's default tools
          # include GitHub inline-comment + repo-read; we keep that
          # and forbid anything else through the prompt and through
          # the absence of repo-write permission on the permissions block.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(cat:*),Bash(grep:*),Bash(find:*),Bash(ls:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            HEAD SHA: ${{ github.event.pull_request.head.sha }}

            # You are a fresh-context heavy-lane first-pass reviewer

            This PR touches at least one heavy-lane path
            (`heavy_lane` group) or extension-layer path
            (`claude_system` group). The canonical enumeration lives
            in `.claude/path_registry.yaml` — see that file for the
            current list and the per-path `why`.

            ## Your job — REVIEW ONLY

            Read the diff and post a verdict comment. **You are
            review/comment-only**: do NOT change code, do NOT push
            commits, do NOT propose patches, do NOT auto-fix, do NOT
            auto-merge, do NOT recommend trading positions or strategy
            changes, do NOT write to Anthropic memory or Claude
            memstores, do NOT request any tool other than the
            commenting tools allowlisted above.

            ## What to verify (in order)

            1. **Lane discipline** —
               `docs/DEV_PIPELINE_STANDARD.md` §0 + §1 mandate the
               full pipeline for heavy-lane paths. Has the PR body
               declared its lane (the PR template requires this)? Is
               there a spec reference if the change is non-trivial?

            2. **Heavy-lane rule compliance** — read
               `.claude/rules/heavy-lane.md`. Does the change satisfy
               the listed steps (brainstorm, expert-harden, spec,
               plan, subagent-driven execution, split-review)?
               Spec/plan absence is a REQUEST_CHANGES signal unless
               the diff is a fast-lane carve-out (one-sentence,
               single-file, no migration, no new public API).

            3. **Path-specific rules** — read the rule whose
               `paths:` frontmatter matches the touched files (e.g.
               `.claude/rules/risk-path.md` for `tpcore/risk/**`,
               `.claude/rules/migrations.md` for
               `platform/migrations/**`,
               `.claude/rules/selfheal-auditheal.md` for
               `tpcore/{selfheal,auditheal}/**`). Cite each rule
               invariant that the PR satisfies OR violates with
               file:line evidence.

            4. **Universal invariants from CLAUDE.md** — UTC only,
               no yfinance, no Discord, no manual execution, all
               type-hinted, Pydantic v2, structlog,
               `from __future__ import annotations`, no private-
               attribute access on tpcore classes, no
               `# noqa: SLF001` introduced.

            5. **Test coverage proportionate to risk** — heavy-lane
               changes require tests at the changed surface, not just
               downstream. Risk-path / capital-gate / validation
               changes especially.

            6. **CI gate honesty** — if the PR description claims CI
               green, verify with `gh pr checks ${{ github.event.pull_request.number }}`.
               Read the `statusCheckRollup` conclusion, NOT
               `mergeStateStatus` (per
               docs/DEV_PIPELINE_STANDARD.md §2).

            ## Verdict (mandatory final comment)

            Post **one** final comment containing a single line of:

            - `VERDICT: PASS` — change satisfies the heavy-lane
              discipline; operator should still apply their own
              spot-check before merge.
            - `VERDICT: REQUEST_CHANGES` — at least one rule
              invariant is violated. Cite each violation with
              file:line + the rule it violates.
            - `VERDICT: NEEDS_OPERATOR_REVIEW` — the change is
              outside what a first-pass automated reviewer can verify
              (e.g., the diff is non-obvious quant logic, or a spec
              decision the operator must make personally).

            ## What you MUST NOT do

            - Do NOT make code changes, file edits, or commits.
            - Do NOT push to the branch or open a PR.
            - Do NOT call any tool not in the allowlist above.
            - Do NOT auto-merge, auto-fix, or auto-rebase.
            - Do NOT recommend trading strategies, position sizes,
              ticker selections, or any live-money action.
            - Do NOT write to Anthropic API memstores or Claude
              memory.
            - Do NOT touch `.env`, secrets, broker credentials, or
              any tracked file outside the diff under review.
            - Do NOT speculate about live-money outcomes. Per
              `docs/MASTER_PLAN.md` §1.2: "AI is auditor, never
              execution authority."

            ## Acceptance of authority

            This is a FIRST-PASS automated reviewer. The operator
            remains the final gate. A `VERDICT: PASS` is necessary
            but not sufficient for merge; a `VERDICT: REQUEST_CHANGES`
            blocks merge until the listed issues are resolved or the
            operator explicitly overrides.
